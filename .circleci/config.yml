version: 2.1

orbs:
  android: circleci/android@2.5.0
  advanced-checkout: vsco/advanced-checkout@1.1.0
  node: circleci/node@5.2.0
  ios: circleci/macos@2.5.4
  slack: circleci/slack@5.1.1

references:
  release_dependencies: &release_dependencies
    - danger
    - lint
    - test_module
    - test_android
    - e2e_android
    - e2e_ios
    - validate_shell_files
    - sync_generated_files
    - test_ios

commands:
  install_node_modules:
    parameters:
      app-dir:
        type: string
        default: .
    steps:
      - node/install:
          install-yarn: true
          node-version: 'v20.11.1'
      - node/install-packages:
          pkg-manager: yarn
          cache-version: v3
          # Network concurrency is set to 1 for installation from GitHub to work.
          override-ci-command: yarn install --frozen-lockfile --network-concurrency 1
          app-dir: << parameters.app-dir >>
  install_pods:
    parameters:
      working_directory:
        type: string
      deployment:
        type: boolean
        default: false
    steps:
      - run:
          name: Uninstall Existing CocoaPods
          command: gem uninstall -x cocoapods
      - run:
          name: Install CocoaPods
          command: gem install cocoapods:1.16.2
      - restore_cache:
          name: Restore Pods Cache
          keys:
            - v1-pods-{{ checksum "<< parameters.working_directory >>/Podfile.lock" }}
      - when:
          condition: << parameters.deployment >>
          steps:
            - run:
                name: Install Pods
                working_directory: << parameters.working_directory >>
                command: pod install --deployment
      - unless:
          condition: << parameters.deployment >>
          steps:
            - run:
                name: Install Pods
                working_directory: << parameters.working_directory >>
                command: pod install
      - save_cache:
          name: Save Pods Cache
          key: v1-pods-{{ checksum "<< parameters.working_directory >>/Podfile.lock" }}
          paths:
            - << parameters.working_directory >>/Pods
  find_and_replace:
    parameters:
      files:
        description: A space-separated list of files to search and replace in.
        type: string
      search:
        type: string
      replace:
        type: string
      working_directory:
        type: string
        default: ~/project
    steps:
      - run:
          name: Find and Replace in << parameters.files >>
          command: node ~/project/scripts/replace.js << parameters.search >> << parameters.replace >> << parameters.files >>
          working_directory: << parameters.working_directory >>

  prepare_custom_package:
    parameters:
      npm_package:
        type: string
      android_package:
        type: string
      api_endpoint:
        type: string
      working_directory:
        type: string
        default: ~/project
    steps:
      - run:
          name: Remove README.md file
          command: rm README.md
          working_directory: << parameters.working_directory >>
      - find_and_replace:
          files: package.json android/sourcemaps.gradle ios/sourcemaps.sh
          search: '@luciq/react-native'
          replace: << parameters.npm_package >>
          working_directory: << parameters.working_directory >>
      - find_and_replace:
          files: cli/upload/uploadSourcemaps.ts cli/upload/uploadSoFiles.ts
          search: api.instabug.com
          replace: << parameters.api_endpoint >>
          working_directory: << parameters.working_directory >>
      - find_and_replace:
          files: android/native.gradle
          search: 'ai.luciq.library:luciq:'
          replace: 'ai.luciq.library-<< parameters.android_package >>:luciq:'
          working_directory: << parameters.working_directory >>

  notify_github:
    parameters:
      data:
        type: string
        description: The data to be passed to the GitHub API for creating the comment.
    steps:
      - run:
          name: Post comment on GitHub
          command: ./scripts/notify-github.sh "<< parameters.data >>"

  generate_luciq_github_app_token:
    parameters:
      script-path:
        type: string
        default: scripts/get-github-app-token.sh
    steps:
      - run:
          name: Generate Luciq GitHub App Token
          command: |
            TOKEN=$(bash << parameters.script-path >> LUCIQ_APP_ID LUCIQ_PRIVATE_KEY LUCIQ_INSTALLATION_ID)
            echo "export GH_TOKEN='$TOKEN'" >> "$BASH_ENV"
            echo "export DANGER_GITHUB_API_TOKEN='$TOKEN'" >> "$BASH_ENV"
            echo "export RELEASE_GITHUB_TOKEN='$TOKEN'" >> "$BASH_ENV"

  notify_slack_with_release:
    parameters:
      channel:
        type: string
        default: C08F3Q30U7Q
    steps:
      - slack/notify:
          channel: <<parameters.channel>>
          event: pass
          custom: |
            {
            	"blocks": [
            		{
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": ":react: React Native `v$(./scripts/releases/get_sdk_version.sh)` is released by <@$(./scripts/releases/get_job_approver.sh)> 🚀"
                  }
                },
            		{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "$(./scripts/releases/get_release_notes.sh)"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "cc: <@U5697F4EL> @support_team <@ULDFCC09J>"
                  }
                }
              ]
            }

jobs:
  danger:
    executor:
      name: node/default
    steps:
      - advanced-checkout/shallow-checkout
      - install_node_modules
      - attach_workspace:
          at: coverage
      - generate_luciq_github_app_token
      - run:
          name: Run Danger
          command: yarn danger ci

  lint:
    executor:
      name: node/default
    steps:
      - advanced-checkout/shallow-checkout
      - install_node_modules
      - run:
          name: Check Format
          command: yarn format
      - run:
          name: Check Lint
          command: yarn lint:ci

  test_module:
    parameters:
      prepare_steps:
        type: steps
        default: []
      collect_coverage:
        type: boolean
        default: false
    executor:
      name: node/default
    steps:
      - advanced-checkout/shallow-checkout
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - run:
          name: Run Tests
          command: yarn test
      - when:
          condition: << parameters.collect_coverage >>
          steps:
            - persist_to_workspace:
                root: coverage
                paths:
                  - lcov.info

  test_android:
    parameters:
      prepare_steps:
        type: steps
        default: []
      collect_coverage:
        type: boolean
        default: false
    executor:
      name: android/android-machine
      tag: '2024.01.1'
    working_directory: ~/project/examples/default
    environment:
      LUCIQ_SOURCEMAPS_UPLOAD_DISABLE: true
    steps:
      - advanced-checkout/shallow-checkout
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - android/run-tests:
          working-directory: android
          test-command: ./gradlew test
      - when:
          condition: << parameters.collect_coverage >>
          steps:
            - persist_to_workspace:
                root: ~/project/android/build/reports/jacoco/jacocoTestReport
                paths:
                  - jacocoTestReport.xml

  validate_shell_files:
    machine:
      image: ubuntu-2004:current
    steps:
      - advanced-checkout/shallow-checkout
      - run:
          name: Validate Scripts
          command: ls scripts/*.sh | xargs bash -n
      - run:
          name: Validate iOS Script
          command: bash -n ios/sourcemaps.sh

  # Make sure that files like yarn.lock and project.pbxproj
  # are in sync with the latest changes in package.json and
  # ios/upload_sourcemap.sh files respectively.
  sync_generated_files:
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    steps:
      - advanced-checkout/shallow-checkout
      - install_node_modules
      - node/install-packages:
          pkg-manager: yarn
          app-dir: examples/default
          cache-version: v3

      - install_pods:
          working_directory: examples/default/ios
          deployment: true
      - run: git --no-pager diff
      - run: git diff-index HEAD --exit-code -p -I EXCLUDED_ARCHS # Ignore Arch Changes

  test_ios:
    parameters:
      prepare_steps:
        type: steps
        default: []
      collect_coverage:
        type: boolean
        default: false
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    working_directory: ~/project/examples/default
    environment:
      LUCIQ_SOURCEMAPS_UPLOAD_DISABLE: true
    steps:
      - advanced-checkout/shallow-checkout
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - install_pods:
          working_directory: ios
      - run:
          name: Build and run tests
          working_directory: ios
          command: |
            xcodebuild -allowProvisioningUpdates \
                -workspace LuciqExample.xcworkspace \
                -scheme LuciqExample \
                -resultBundlePath coverage/result.xcresult \
                -sdk iphonesimulator \
                -enableCodeCoverage YES \
                -destination 'platform=iOS Simulator,name=iPhone 16 Pro Max,OS=18.5' \
                test | xcpretty
      - when:
          condition: << parameters.collect_coverage >>
          steps:
            - run:
                name: Convert xcresult into JSON report
                working_directory: ios/coverage
                command: xcrun xccov view --report --json result.xcresult > xcode.json
            - persist_to_workspace:
                root: ios/coverage
                paths:
                  - xcode.json

  e2e_ios:
    parameters:
      prepare_steps:
        type: steps
        default: []
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    environment:
      LUCIQ_SOURCEMAPS_UPLOAD_DISABLE: true
    steps:
      - advanced-checkout/shallow-checkout
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - node/install-packages:
          pkg-manager: yarn
          app-dir: examples/default
      - install_pods:
          working_directory: examples/default/ios
      - run:
          name: Install Maestro CLI
          command: curl -Ls "https://get.maestro.mobile.dev" | bash
      - run:
          name: Add Maestro to PATH
          command: echo 'export PATH="$PATH:$HOME/.maestro/bin"' >> $BASH_ENV
      - ios/preboot-simulator:
          version: '18.5'
          device: 'iPhone 16 Pro'
      - ios/wait-until-simulator-booted
      - ios/wait-until-simulator-booted
      - run:
          name: sleep 10 seconds
          command: sleep 10
      - run:
          name: sleep 10 seconds
          command: sleep 10
      - run:
          name: Customize API Endpoints
          command: ./scripts/customize-ios-endpoints.sh
      - run:
          name: Build iOS App
          working_directory: examples/default
          command: |
            yarn e2e:ios:build
            yarn e2e:ios:install
      - run:
          name: Maestro - Run E2E Tests
          working_directory: examples/default
          command: maestro test e2e/bug-reporting-flow.yaml

  e2e_android:
    parameters:
      prepare_steps:
        type: steps
        default: []
    executor:
      name: android/android-machine
      tag: '2024.01.1'
      resource-class: large
    environment:
      LUCIQ_SOURCEMAPS_UPLOAD_DISABLE: true
    steps:
      - advanced-checkout/shallow-checkout
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - node/install-packages:
          pkg-manager: yarn
          app-dir: examples/default
      - run:
          name: Install Maestro CLI
          command: curl -Ls "https://get.maestro.mobile.dev" | bash
      - run:
          name: Add Maestro to PATH
          command: echo 'export PATH="$PATH:$HOME/.maestro/bin"' >> $BASH_ENV
      - android/create-avd:
          avd-name: Nexus_6P_API_27
          install: true
          system-image: system-images;android-27;default;x86
      - android/start-emulator:
          avd-name: Nexus_6P_API_27
          no-window: true
          memory: 2048
          post-emulator-launch-assemble-command: |
            cd ~/project/examples/default
            yarn e2e:android:build
            yarn e2e:android:install
      - run:
          name: Maestro - Run E2E Tests
          working_directory: examples/default
          command: maestro test e2e/bug-reporting-flow-android.yaml

  release_custom_package:
    parameters:
      prepare_steps:
        type: steps
        default: []
      api_endpoint:
        type: string
      dashboard_token_env:
        type: env_var_name
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    working_directory: ~/project
    steps:
      - advanced-checkout/shallow-checkout
      - run: git clone -b master2 git@github.com:Instabug/Escape.git
      - run:
          working_directory: Escape
          command: swift build -c release
      - run:
          working_directory: Escape/.build/release
          command: cp -f Escape /usr/local/bin/escape
      - steps: << parameters.prepare_steps >>
      - install_node_modules
      - run:
          name: Build the SDK
          command: yarn build
      - run:
          name: Publish Custom Package with Escape
          command: Escape react-native publish-custompackage-luciq
          environment:
            DASHBOARD_TOKEN: << parameters.dashboard_token_env >>
            DASHBOARD_API_ENDPOINT: << parameters.api_endpoint >>

  publish:
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    working_directory: '~'
    steps:
      - advanced-checkout/shallow-checkout
      - run: git clone -b master2 git@github.com:Instabug/Escape.git
      - run:
          working_directory: Escape
          command: swift build -c release
      - run:
          working_directory: Escape/.build/release
          command: cp -f Escape /usr/local/bin/escape
      - install_node_modules:
          app-dir: project
      - run:
          working_directory: project
          command: yarn build
      - generate_luciq_github_app_token:
          script-path: project/scripts/get-github-app-token.sh
      - run:
          name: Publish Official Package with Escape
          working_directory: project
          command: Escape react-native publish-luciq
          environment:
            DASHBOARD_API_ENDPOINT: api.instabug.com

  generate_snapshot:
    executor:
      name: node/default
    steps:
      - advanced-checkout/shallow-checkout
      - install_node_modules
      - run: yarn build
      - run: yarn remove @instabug/danger-plugin-coverage
      - run:
          name: Get snapshot version
          command: |
            source scripts/snapshot-version.sh
            echo "export SNAPSHOT_VERSION=$SNAPSHOT_VERSION" >> "$BASH_ENV"
      - run:
          name: Authorize with NPM
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - run: npm version $SNAPSHOT_VERSION --no-git-tag-version
      - run: npm publish --tag snapshot
      - run:
          name: Install jq
          command: sudo apt-get update && sudo apt-get install -y jq
      - find_and_replace:
          files: scripts/snapshot-comment.md
          search: '{VERSION}'
          replace: $SNAPSHOT_VERSION
      - notify_github:
          data: "$(jq -Rcs '{ body: . }' scripts/snapshot-comment.md)"

  release_slack_notification:
    parameters:
      channel:
        type: string
        default: C08F3Q30U7Q
    docker:
      - image: cimg/base:current
    steps:
      - advanced-checkout/shallow-checkout
      - notify_slack_with_release:
          channel: <<parameters.channel>>

workflows:
  publish:
    jobs:
      - danger:
          requires:
            - test_module
            - test_android
            - test_ios
      - lint
      - test_module:
          collect_coverage: true
      - test_android:
          collect_coverage: true
      - test_ios:
          collect_coverage: true
      - validate_shell_files
      - sync_generated_files
      - e2e_ios
      - e2e_android
      - hold_generate_snapshot:
          type: approval
          requires: *release_dependencies
      - generate_snapshot:
          requires:
            - hold_generate_snapshot
      - hold_publish:
          requires: *release_dependencies
          type: approval
          filters:
            branches:
              only: master
      - publish:
          requires:
            - hold_publish
          filters:
            branches:
              only: master
      - hold_release_nn:
          requires: *release_dependencies
          type: approval
          filters:
            branches:
              only: master
      - release_custom_package:
          name: release_nn
          requires:
            - hold_release_nn
          filters:
            branches:
              only: master
          prepare_steps:
            - prepare_custom_package:
                npm_package: '@luciq/react-native-nn'
                android_package: nn
                api_endpoint: st001009nn.instabug.com
          api_endpoint: st001009nn.instabug.com
          dashboard_token_env: NN_TOKEN

      - hold_release_injazat:
          requires: *release_dependencies
          type: approval
          filters:
            branches:
              only: master
      - release_custom_package:
          name: release_injazat
          requires:
            - hold_release_injazat
          filters:
            branches:
              only: master
          prepare_steps:
            - prepare_custom_package:
                npm_package: '@luciq/react-native-injazat'
                android_package: injazat
                api_endpoint: st001013mec1.instabug.com
          api_endpoint: st001013mec1.instabug.com
          dashboard_token_env: INJAZAT_TOKEN

      - release_slack_notification:
          requires:
            - publish
          context: slack-app

  send-release-notes:
    jobs:
      - hold_slack_notification:
          type: approval
          filters:
            branches:
              only: ci/automate-release-notes-for-slack
      - release_slack_notification:
          requires:
            - hold_slack_notification
          context: slack-app
