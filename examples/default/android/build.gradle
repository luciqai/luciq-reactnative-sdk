// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
        maven {
            url "https://mvn.luciq.ai/nexus/repository/luciq-internal/"
            credentials {
                username "luciq"
                password System.getenv("LUCIQ_REPOSITORY_PASSWORD")
            }
        }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("ai.luciq.library:luciq-plugin:19.4.0")
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/detox/Detox-android")
        }

         maven { url "https://mvn.luciq.ai/nexus/repository/luciq-internal/"
                    credentials {
                        username "luciq"
                password System.getenv("LUCIQ_REPOSITORY_PASSWORD")
                    }
             }

    }
}
